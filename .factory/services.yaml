commands:
  install: npm install
  build: npm run build
  test: npm run test
  typecheck: npm run typecheck
  lint: npm run lint
  dev: npm run dev

services:
  vite-dev:
    start: PORT=5173 npm run dev
    stop: lsof -ti :5173 | xargs kill
    healthcheck: curl -sf http://localhost:5173
    port: 5173
    depends_on: []

  electron:
    start: npm run dev:electron
    stop: lsof -ti :9222 | xargs kill 2>/dev/null; lsof -ti :5173 | xargs kill 2>/dev/null
    healthcheck: echo "Electron app"
    port: 9222
    depends_on: [vite-dev]
